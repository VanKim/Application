
#CI
name: Application CI/CD
run-name: Application CI/CD | ${{ github.ref_name }} | ${{ github.actor }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
    - name: By Pass CI
      run: exit 0

#CD: deploy DEV
  deploy-dev:
      name: Deploy to DEV
      runs-on: ubuntu-latest
      needs: ci

      steps:
        - name: Deploy application to DEV
          run: echo "Deploying to DEV environment..."

  #Test DEV
  test-dev:
      name: Automation Test on DEV
      runs-on: ubuntu-latest
      needs: deploy-dev

      steps:
        - name: Trigger automation tests
          run: |
            curl -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.AUTOMATION_PAT }}" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/VanKim/Automation_02/dispatches \
              -d '{"event_type":"run-dev-tests"}'



